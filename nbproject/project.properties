application.title=KharlMotorPH
application.vendor=Claire
build.classes.dir=${build.dir}/classes
build.classes.excludes=**/*.java,**/*.form
# This directory is removed when the project is cleaned:
build.dir=build
build.generated.dir=${build.dir}/generated
build.generated.sources.dir=${build.dir}/generated-sources
# Only compile against the classpath explicitly listed here:
build.sysclasspath=ignore
build.test.classes.dir=${build.dir}/test/classes
build.test.results.dir=${build.dir}/test/results
# Uncomment to specify the preferred debugger connection transport:
#debug.transport=dt_socket
debug.classpath=\
    ${run.classpath}
debug.test.classpath=\
    ${run.test.classpath}
# This directory is removed when the project is cleaned:
dist.dir=dist
dist.jar=${dist.dir}/KharlMotorPH.jar
dist.javadoc.dir=${dist.dir}/javadoc
excludes=
file.reference.sqlite-jdbc.jar=lib/sqlite-jdbc.jar
file.reference.jcalendar-1.4.jar=lib/JCalendar/jcalendar-1.4.jar
file.reference.opencsv-3.8.jar=lib/opencsv-3.8.jar
file.reference.slf4j-api.jar=lib/slf4j-api.jar
file.reference.slf4j-simple.jar=lib/slf4j-simple.jar
file.reference.AbsoluteLayout.jar=lib/absolutelayout/AbsoluteLayout.jar
# NetBeans library references
libs.absolutelayout.classpath=\
    ${base}/absolutelayout/AbsoluteLayout.jar
libs.JCalendar.classpath=\
    ${base}/JCalendar/jcalendar-1.4.jar
includes=**
jar.compress=false
jar.index=${jnlp.enabled}
javac.classpath=\
    ${file.reference.sqlite-jdbc.jar};\
    ${file.reference.jcalendar-1.4.jar};\
    ${file.reference.opencsv-3.8.jar};\
    ${file.reference.slf4j-api.jar};\
    ${file.reference.slf4j-simple.jar};\
    ${file.reference.AbsoluteLayout.jar}
# Space-separated list of extra javac options
javac.compilerargs=
javac.deprecation=false
javac.external.vm=false
javac.processormodulepath=
javac.processorpath=\
    ${javac.classpath}
javac.source=22
javac.target=22
javac.test.classpath=\
    ${javac.classpath};\
    ${build.classes.dir}
javac.test.processorpath=\
    ${javac.test.classpath}
javadoc.additionalparam=
javadoc.author=false
javadoc.encoding=${source.encoding}
javadoc.noindex=false
javadoc.nonavbar=false
javadoc.notree=false
javadoc.private=false
javadoc.splitindex=true
javadoc.use=false
javadoc.version=false
javadoc.windowtitle=
main.class=loginandregister.LoginAndRegister
manifest.file=manifest.mf
meta.inf.dir=${src.dir}/META-INF
mkdist.disabled=false
platform.active=default_platform
run.classpath=\
    ${file.reference.sqlite-jdbc.jar};\
    ${file.reference.jcalendar-1.4.jar};\
    ${file.reference.opencsv-3.8.jar};\
    ${file.reference.slf4j-api.jar};\
    ${file.reference.slf4j-simple.jar};\
    ${file.reference.AbsoluteLayout.jar};\
    ${build.classes.dir}
# Space-separated list of JVM arguments used when running the project.
# You may also define separate properties like run-sys-prop.name=value instead of -Dname=value.
# To set system properties for unit tests define test-sys-prop.name=value:
run.jvmargs=
run.test.classpath=\
    ${javac.test.classpath};\
    ${build.test.classes.dir}
source.encoding=UTF-8
src.dir=src
test.src.dir=test
